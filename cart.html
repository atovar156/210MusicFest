<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>210MusicFest - Shopping Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,600&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --dark:#1a1208; --darker:#110d05; --gold:#d4a017; --orange:#c94f1e; --cream:#f5ead5; --muted:#9e8a6a; --border:rgba(212,160,23,0.25); }
      html { scroll-behavior: smooth; }
      body { min-height: 100vh; background: var(--dark); color: var(--cream); font-family:'Barlow Condensed',sans-serif; padding-top: 60px; }
      nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:60px; background:var(--darker); border-bottom:2px solid var(--orange); }
      .nav-logo { color:var(--cream); text-decoration:none; font-weight:700; letter-spacing:0.02em; }
      .nav-logo em { color:var(--gold); font-style:italic; }
      .nav-logo img {
        width: 100px;
        height: auto;
        object-fit: contain;
      }
      .nav-links { display:flex; gap:1.8rem; list-style:none; }
      .nav-links a, .btn-nav { color:var(--cream); text-decoration:none; font-size:0.78rem; letter-spacing:0.18em; text-transform:uppercase; opacity:.85; }
      .nav-links a:hover, .btn-nav:hover { opacity:1; }
      .btn-nav { background:var(--orange); padding:.55rem 1.2rem; border:none; font-weight:700; cursor: pointer; }
      .page-header { padding: 5rem 2rem 2rem; text-align:center; }
      .page-header h1 { font-family:'Playfair Display',serif; font-size:clamp(3.5rem,6vw,5.5rem); line-height:1; margin-bottom:1rem; }
      .page-header p { color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; font-size:0.8rem; }
      .content { max-width: 900px; margin: 0 auto; padding: 0 2rem 4rem; }
      .cart-table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
      .cart-table th { text-align: left; padding: 1rem; border-bottom: 2px solid var(--orange); color: var(--orange); font-weight: 700; }
      .cart-table td { padding: 1rem; border-bottom: 1px solid var(--border); }
      .cart-item-name { color: var(--cream); font-weight: 600; }
      .cart-item-price { color: var(--gold); }
      .remove-btn { background: none; border: none; color: var(--orange); cursor: pointer; text-decoration: underline; font-family: 'Barlow Condensed', sans-serif; }
      .remove-btn:hover { color: #c94f1e; }
      .cart-summary { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; margin-bottom: 2rem; text-align: right; }
      .summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 1.1rem; }
      .summary-row.total { border-top: 1px solid var(--border); padding-top: 1rem; color: var(--gold); font-weight: 700; font-size: 1.3rem; }
      .button-group { display: flex; gap: 1rem; justify-content: flex-end; }
      .btn-checkout { background: var(--orange); color: #fff; padding: 0.8rem 2rem; border: none; border-radius: 0.5rem; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; transition: background 0.2s; }
      .btn-checkout:hover { background: #a83e12; }
      .btn-continue { background: none; color: var(--gold); padding: 0.8rem 2rem; border: 1px solid var(--gold); border-radius: 0.5rem; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; transition: all 0.2s; text-decoration: none; display: inline-block; }
      .btn-continue:hover { background: var(--gold); color: var(--dark); }
      .empty-cart { text-align: center; padding: 3rem 2rem; }
      .empty-cart h2 { margin-bottom: 1rem; }
      .empty-cart p { color: var(--muted); margin-bottom: 2rem; }
      footer { padding:2rem; text-align:center; color:var(--muted); font-size:.75rem; border-top:1px solid var(--border); }
      
      /* Mobile Responsive Styles */
      @media (max-width: 768px) {
        nav { padding: 0 1rem; }
        .nav-logo img { width: 80px; }
        .nav-links { gap: 1.2rem; }
        .nav-links a { font-size: 0.65rem; }
        .btn-nav { font-size: 0.65rem; padding: 0.5rem 1rem; }
        .page-header { padding: 4rem 1rem 1.5rem; }
        .page-header h1 { font-size: 2.5rem; }
        .content { padding: 0 1rem 3rem; }
        .cart-table { font-size: 0.9rem; }
        .cart-table th, .cart-table td { padding: 0.8rem 0.5rem; }
        .cart-summary { padding: 1.5rem; }
        .summary-row { font-size: 0.95rem; }
        .button-group { gap: 0.8rem; }
        .btn-checkout, .btn-continue { padding: 0.7rem 1.5rem; font-size: 0.85rem; }
      }
      
      @media (max-width: 480px) {
        body { padding-top: 50px; }
        nav { padding: 0 0.5rem; height: 50px; }
        .nav-logo img { width: 70px; }
        .nav-links { gap: 0.8rem; }
        .nav-links a { font-size: 0.55rem; }
        .btn-nav { font-size: 0.55rem; padding: 0.4rem 0.7rem; }
        .page-header { padding: 3rem 0.5rem 1rem; }
        .page-header h1 { font-size: 2rem; }
        .content { padding: 0 0.5rem 2rem; }
        .cart-table { font-size: 0.8rem; }
        .cart-table th, .cart-table td { padding: 0.6rem 0.3rem; }
        .cart-summary { padding: 1.2rem; }
        .summary-row { font-size: 0.9rem; margin-bottom: 0.8rem; }
        .summary-row.total { font-size: 1rem; }
        .button-group { flex-direction: column; }
        .btn-checkout, .btn-continue { padding: 0.6rem 1.2rem; font-size: 0.8rem; }
        .empty-cart h2 { font-size: 1.5rem; }
        .empty-cart p { font-size: 0.9rem; }
        footer { padding: 1.5rem 0.5rem; font-size: 0.7rem; }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="nav-logo"><img src="Logo for Company horizontal light version.png" alt="210 Music Fest Logo"></a>
      <ul class="nav-links">
        <li><a href="lineup.html">Lineup</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="merchandise.html">Merchandise</a></li>
        <li><a href="tickets.html">Tickets</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <a href="cart.html" class="btn-nav">Cart</a>
    </nav>
    <header class="page-header">
      <h1>Shopping Cart</h1>
      <p>Review your items and proceed to checkout</p>
    </header>
    <main class="content">
      <div id="cartContent"></div>
    </main>
    <footer>© 2025 Music Festival • San Antonio, TX</footer>

    <script>
      function loadCart() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const cartContent = document.getElementById('cartContent');
        
        if (cart.length === 0) {
          cartContent.innerHTML = `
            <div class="empty-cart">
              <h2>Your cart is empty</h2>
              <p>Start shopping to add items to your cart</p>
              <a href="merchandise.html" class="btn-continue">Continue Shopping</a>
            </div>
          `;
          return;
        }
        
        let total = 0;
        let tableRows = '';
        
        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          tableRows += `
            <tr>
              <td class="cart-item-name">${item.name}</td>
              <td>${item.quantity}</td>
              <td class="cart-item-price">$${item.price.toFixed(2)}</td>
              <td class="cart-item-price">$${itemTotal.toFixed(2)}</td>
              <td><button class="remove-btn" onclick="removeItem(${index})">Remove</button></td>
            </tr>
          `;
        });
        
        cartContent.innerHTML = `
          <table class="cart-table">
            <thead>
              <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
          <div class="cart-summary">
            <div class="summary-row">
              <span>Subtotal:</span>
              <span>$${total.toFixed(2)}</span>
            </div>
            <div class="summary-row">
              <span>Tax:</span>
              <span>$${(total * 0.08625).toFixed(2)}</span>
            </div>
            <div class="summary-row total">
              <span>Total:</span>
              <span>$${(total * 1.08625).toFixed(2)}</span>
            </div>
          </div>
          <div class="button-group">
            <a href="merchandise.html" class="btn-continue">Continue Shopping</a>
            <button class="btn-checkout" onclick="proceedToCheckout()">Proceed to Checkout</button>
          </div>
        `;
      }
      
      function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
      }
      
      function proceedToCheckout() {
        window.location.href = 'checkout.html';
      }
      
      loadCart();
    </script>
  </body>
</html>
