<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>210MusicFest - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,600&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --dark:#1a1208; --darker:#110d05; --gold:#d4a017; --orange:#c94f1e; --cream:#f5ead5; --muted:#9e8a6a; --border:rgba(212,160,23,0.25); }
      html { scroll-behavior: smooth; }
      body { min-height: 100vh; background: var(--dark); color: var(--cream); font-family:'Barlow Condensed',sans-serif; }
      nav { display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:60px; background:var(--darker); border-bottom:2px solid var(--orange); }
      .nav-logo { color:var(--cream); text-decoration:none; font-weight:700; letter-spacing:0.02em; }
      .nav-logo em { color:var(--gold); font-style:italic; }
      .nav-logo img { width: 100px; height: auto; object-fit: contain; }
      .nav-links { display:flex; gap:1.8rem; list-style:none; }
      .nav-links a, .btn-nav { color:var(--cream); text-decoration:none; font-size:0.78rem; letter-spacing:0.18em; text-transform:uppercase; opacity:.85; }
      .nav-links a:hover, .btn-nav:hover { opacity:1; }
      .btn-nav { background:var(--orange); padding:.55rem 1.2rem; border:none; font-weight:700; cursor: pointer; }
      .page-header { padding: 5rem 2rem 2rem; text-align:center; }
      .page-header h1 { font-family:'Playfair Display',serif; font-size:clamp(3.5rem,6vw,5.5rem); line-height:1; margin-bottom:1rem; }
      .page-header p { color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; font-size:0.8rem; }
      .content { max-width: 900px; margin: 0 auto; padding: 0 2rem 4rem; }
      .checkout-container { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
      @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
      .checkout-section { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; }
      .checkout-section h2 { font-size: 1.3rem; margin-bottom: 1.5rem; color: var(--orange); }
      .form-group { margin-bottom: 1.5rem; }
      .form-group label { display: block; font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--cream); }
      .form-group input, .form-group select { width: 100%; padding: 0.8rem; background: rgba(0,0,0,.3); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--cream); font-family: 'Barlow Condensed', sans-serif; }
      .form-group input::placeholder { color: var(--muted); }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .order-summary { background: rgba(255,255,255,.08); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1.5rem; }
      .summary-item { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.9rem; }
      .summary-item.total { border-top: 1px solid var(--border); padding-top: 1rem; font-size: 1.1rem; color: var(--gold); font-weight: 700; }
      .btn-place-order { width: 100%; background: var(--orange); color: #fff; padding: 1rem; border: none; border-radius: 0.5rem; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; transition: background 0.2s; }
      .btn-place-order:hover { background: #a83e12; }
      footer { padding:2rem; text-align:center; color:var(--muted); font-size:.75rem; border-top:1px solid var(--border); }
      
      /* Mobile Responsive Styles */
      @media (max-width: 768px) {
        nav { padding: 0 1rem; }
        .nav-logo img { width: 80px; }
        .nav-links { gap: 1rem; }
        .nav-links a { font-size: 0.7rem; }
        .btn-nav { font-size: 0.7rem; padding: 0.5rem 1rem; }
        .page-header { padding: 4rem 1rem 1.5rem; }
        .page-header h1 { font-size: 2.5rem; }
        .content { padding: 0 1rem 3rem; }
        .checkout-section { padding: 1.5rem; }
        .order-summary { padding: 1.2rem; }
        .summary-item { font-size: 0.9rem; }
        .summary-item.total { font-size: 1rem; }
        .btn-place-order { padding: 0.8rem 1.5rem; font-size: 0.9rem; }
      }
      
      @media (max-width: 480px) {
        nav { padding: 0 0.5rem; height: 50px; }
        .nav-logo img { width: 70px; }
        .nav-links { gap: 0.5rem; }
        .nav-links a { font-size: 0.65rem; }
        .btn-nav { font-size: 0.65rem; padding: 0.4rem 0.8rem; }
        .page-header { padding: 3rem 0.5rem 1rem; }
        .page-header h1 { font-size: 2rem; }
        .content { padding: 0 0.5rem 2rem; }
        .checkout-section { padding: 1.2rem; }
        .checkout-section h2 { font-size: 1.1rem; }
        .order-summary { padding: 1rem; }
        .summary-item { font-size: 0.85rem; margin-bottom: 0.8rem; }
        .summary-item.total { font-size: 0.95rem; }
        .btn-place-order { padding: 0.7rem 1.2rem; font-size: 0.85rem; }
        footer { padding: 1.5rem 0.5rem; font-size: 0.7rem; }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="nav-logo"><img src="Logo for Company horizontal light version.png" alt="210 Music Fest Logo"></a>
      <ul class="nav-links">
        <li><a href="lineup.html">Lineup</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="merchandise.html">Merchandise</a></li>
        <li><a href="tickets.html">Tickets</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <a href="cart.html" class="btn-nav">Cart</a>
    </nav>
    <header class="page-header">
      <h1>Checkout</h1>
      <p>Complete your order</p>
    </header>
    <main class="content">
      <div class="checkout-container">
        <div class="checkout-section" style="grid-column: 1 / -1;">
          <h2>Order Summary</h2>
          <div id="orderSummary" class="order-summary"></div>
          <button class="btn-place-order" onclick="placeOrder()">Place Order</button>
        </div>
      </div>
    </main>
    <footer>© 2025 Music Festival • San Antonio, TX</footer>

    <script>
      function loadOrderSummary() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        let total = 0;
        let summaryHTML = '';
        
        cart.forEach(item => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          summaryHTML += `
            <div class="summary-item">
              <span>${item.name} x${item.quantity}</span>
              <span>$${itemTotal.toFixed(2)}</span>
            </div>
          `;
        });
        
        const tax = total * 0.08625;
        const finalTotal = total + tax;
        
        summaryHTML += `
          <div class="summary-item">
            <span>Subtotal:</span>
            <span>$${total.toFixed(2)}</span>
          </div>
          <div class="summary-item">
            <span>Tax:</span>
            <span>$${tax.toFixed(2)}</span>
          </div>
          <div class="summary-item total">
            <span>Total:</span>
            <span>$${finalTotal.toFixed(2)}</span>
          </div>
        `;
        
        document.getElementById('orderSummary').innerHTML = summaryHTML;
      }
      
      function placeOrder() {
        window.location.href = 'confirmation.html';
      }
      
      loadOrderSummary();
    </script>
  </body>
</html>
